  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mdnac-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  protein-api:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: mdnac-protein-api
    working_dir: /workspace/api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MDNAC_API_CONFIG: /workspace/api/config.yaml
      MDNAC_API_ENV: ${MDNAC_API_ENV:-local}
      PYTHONPATH: /workspace
      UV_LINK_MODE: copy
    command:
      - uv
      - run
      - --extra
      - local
      - mdnac-api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ..:/workspace

  next-dashboard:
    build:
      context: ../next
    container_name: mdnac-next-dashboard
    restart: unless-stopped
    environment:
      MDNAC_API_URL: http://protein-api:8000
      NEXT_PUBLIC_MDNAC_API_URL: http://localhost:${API_PORT:-8000}
      NEXT_PUBLIC_MDNAC_WS_URL: ws://localhost:${API_PORT:-8000}/protein-span-completion/ws
      MDNAC_PUBLIC_WS_URL: ws://localhost:${API_PORT:-8000}/protein-span-completion/ws
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - protein-api
    ports:
      - "${NEXT_DASHBOARD_PORT:-3000}:3000"

  ai-agent-api:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: mdnac-ai-agent-api
    working_dir: /workspace/api
    restart: unless-stopped
    env_file:
      - ../api/.env
    environment:
      MDNAC_AGENT_CONFIG: /workspace/api/ai_agent/config/agent.yaml
      PYTHONPATH: /workspace/api
      UV_LINK_MODE: copy
    command:
      - uv
      - run
      - --extra
      - agent
      - mdnac-ai-agent-api
      - --host
      - 0.0.0.0
      - --port
      - "8020"
    ports:
      - "${AI_AGENT_API_PORT:-8020}:8020"
    volumes:
      - ..:/workspace

  structure-api:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: mdnac-structure-api
    working_dir: /workspace/api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MDNAC_STRUCTURE_CONFIG: /workspace/api/config.structure.yaml
      MDNAC_STRUCTURE_ENV: ${MDNAC_STRUCTURE_ENV:-local}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    command:
      - uv
      - run
      - --extra
      - structure
      - mdnac-structure-api
      - --host
      - 0.0.0.0
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${STRUCTURE_API_PORT:-8010}:8010"
    volumes:
      - ..:/workspace
      - simulation_jobs:/workspace/api/data/simulation_jobs

  protein-simulation-worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: mdnac-protein-simulation-worker
    working_dir: /workspace/api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MDNAC_STRUCTURE_CONFIG: /workspace/api/config.structure.yaml
      MDNAC_STRUCTURE_ENV: ${MDNAC_STRUCTURE_ENV:-local}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    command:
      - uv
      - run
      - --extra
      - simulation
      - celery
      - -A
      - structure_predictor.simulation.tasks:celery_app
      - worker
      - --loglevel=info
      - -Q
      - protein_simulation_queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ..:/workspace
      - simulation_jobs:/workspace/api/data/simulation_jobs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  minio_data:
  rabbitmq_data:
  simulation_jobs:
