environment: local

environments:
  local:
    model:
      path: data/model
      device: auto
    generation:
      max_new_tokens: 128
      temperature: 0.0
      top_k:
      seed:
      stop_at_endoftext: true
      ensure_protein_prompt: true
    server:
      host: 127.0.0.1
      port: 8000
      reload: true
    runpod:
      enabled: false

  production:
    model:
      path: /runpod-volume/mdnac/model
      device: cuda
    generation:
      max_new_tokens: 128
      temperature: 0.0
      top_k:
      seed:
      stop_at_endoftext: true
      ensure_protein_prompt: true
    server:
      host: 0.0.0.0
      port: 8000
      reload: false
    runpod:
      enabled: true
      endpoint_name: mdnac-protein-api
      gpu: AMPERE_24
      cpu:
      workers:
        min: 0
        max: 1
      idle_timeout: 60
      flashboot: true
      dependencies:
        - numpy
        - PyYAML
        - onnxruntime-gpu
