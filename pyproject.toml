[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "microbial-dna-compiler"
version = "0.1.0"
description = "Training-data pipeline for microbial protein sequence sources."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "PyYAML>=6.0",
    "torch>=2.9",
]

[project.optional-dependencies]
minio = ["boto3>=1.34"]

[tool.setuptools.packages.find]
include = ["libs*"]
