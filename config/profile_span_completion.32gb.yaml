# Protein span-completion (profile -> sequence) tuned for a 32 GB Tesla V100.
# Pairs with config/train.32gb.yaml (1024-context backbone). Volta -> fp16 (see note below).
# Objective: decoder-only causal LM, prompt-masked, EOS supervised (learn to stop).
paths:
  instruction_jsonl_path: data/compiled/refseq_bacteria_span_completion/instruction.jsonl
  instruction_part_dir: data/compiled/refseq_bacteria_span_completion
  artifact_source_jsonl: data/compiled/refseq_bacteria_span_completion
  base_checkpoint_path: data/checkpoints/protein_from_scratch/checkpoint_best.pt
  checkpoint_dir: data/checkpoints/profile_span_completion
  artifact_dir: data/compiled/refseq_bacteria_span_completion_profile_pretrain
  sequence_tokenizer_map_path: tokenizer_map.json
schema:
  default_sequence_type: protein
  instruction_field: instruction
  input_field: input
  output_field: output
  prompt_format: compact_profile
data:
  prefer_instruction_parts: true
  instruction_part_glob: instruction_part_*.jsonl
  train_ratio: 0.98
  split_seed: 42
  # Completion context follows the backbone (1024 if pretrained with train.32gb.yaml).
  # bs6 x accum11 = effective batch 66 (~64, the design point for sparse span loss),
  # ~23 GB fp16 at ctx 1024. NOTE: the instruction trainer has NO preflight check, so
  # this stays conservatively under 28 GB. Watch nvidia-smi; raise to 7-8 only if the
  # real peak leaves margin (a 1024-ctx backbone at bs8 is ~30 GB = too tight).
  batch_size: 6
  num_workers: 4
  pin_memory: true
  shuffle_files: true
  shuffle_records: true
  shuffle_buffer_size: 8192
  audit_before_training: true
  reuse_existing_audit: false
  count_splits_before_training: auto
  count_progress_every: 250000
artifacts:
  profile_vocab_size: 512
  profile_sample_size: 100000
  kmer_size: 3
  auto_detect_sequence_tokenizer_map: true
  rebuild_artifacts: false
training:
  num_epochs: 2
  max_steps:
  gradient_accumulation_steps: 11   # bs6 x 11 = effective batch 66 (~64)
  eval_freq: 100
  eval_batches: 16
  log_every_steps: 10
  save_every_steps: 250
  grad_clip_norm: 1.0
  save_last: false
  save_best: true
  save_final: true
  train_on_prompt: false
  include_separator_in_loss: false
  # Supervise EOS so the model stops at the right span length (less run-on / hallucination).
  include_eos_in_loss: true
optimizer:
  type: adamw
  learning_rate: 0.00005
  weight_decay: 0.1
  fused: auto
  lr_scheduler: cosine
  warmup_steps: 100
  min_lr_ratio: 0.1
  # Set to the fine-tune horizon (steps) to enable cosine decay; null = warmup then hold.
  lr_decay_steps: null
runtime:
  device: auto
  multi_gpu_mode: auto
  ddp_find_unused_parameters: false
  data_parallel_device_ids:
  # Volta (V100) -> fp16. Change to bf16 ONLY on Ampere+ (A100/A30).
  mixed_precision: fp16
  seed: 123
  # ~half activation VRAM for ~30% slower steps; numerically exact (no dropout).
  gradient_checkpointing: false
# LoRA: freeze backbone, train only low-rank adapters + re-vocabularised embedding/head.
# enabled:false keeps full fine-tuning. Flip to true for a lighter, faster fine-tune.
lora:
  enabled: false
  rank: 8
  alpha: 16
  dropout: 0.0
resume:
  resume_if_available: true
  restore_optimizer_state: true
  strict_backbone: true
