# Pretraining config tuned for a 32 GB Tesla V100 (Volta, sm_70).
# Accuracy-oriented: 2x context (1024) and fp32-precision linear-attention recurrence.
# Volta has NO native bf16 -> use fp16 (real V100 tensor cores). If this is actually an
# Ampere A100/A30 (bf16-capable), switch runtime.mixed_precision to bf16.
# Same 280M validated architecture as the 16GB config (progen_config_overrides UNCHANGED).
mode:
  name: train_from_scratch
  resume_if_available: true
paths:
  train_text_path: data/compiled/refseq_bacteria_protein/train.txt
  tokenizer_map_path: tokenizer_map.json
  checkpoint_dir: data/checkpoints/protein_from_scratch
  train_part_cache_dir: data/cache/protein_train_parts
  resume_state_path: data/checkpoints/protein_from_scratch/resume_state.json
  metrics_history_path: data/checkpoints/protein_from_scratch/metrics_history.jsonl
  training_config_snapshot_path: data/checkpoints/protein_from_scratch/training_config.snapshot.json
data:
  train_part_glob: train_part_*.txt
  prefer_local_train_parts: true
  stream_local_train_parts: true
  keep_downloaded_train_parts: false
  cleanup_completed_parts: false
  validate_cached_parts: true
  train_ratio: 0.9
  split_seed: 42
  # SPEED: fill the card. Extrapolated fp16 peaks @ ctx1024: bs6~23GB, bs7~26.5GB,
  # bs8~30GB. bs7 targets ~28 GB. The peak is in the backward pass (activation-bound),
  # which preflight_vram_check measures on the real GPU -> it aborts cleanly BEFORE
  # training if bs7 exceeds target_vram_gb (28). If preflight passes with headroom you
  # may try bs8; if it aborts, drop to bs6. ACCURACY is set by the EFFECTIVE batch
  # (bs7 x accum18 = 126 ~= 128), not the micro-batch.
  batch_size: 7
  # More workers = faster data feeding (server-class host assumed). Lower if RAM-tight.
  num_workers: 4
  pin_memory: true
  shuffle_parts: true
  shuffle_examples: true
  shuffle_buffer_size: 2048
  # MERGE: concatenate all train_part_*.txt into ONE file at train start (streaming
  # concat on disk, low RAM) and stream it with LINE-level worker sharding so all
  # num_workers stay busy. Avoids multi-part complexity while keeping streaming.
  # Idempotent: reuses an up-to-date merged file. Needs disk space ~= total parts size.
  merge_parts_before_training: true
  merged_train_path: null      # default: <train_part_cache_dir>/merged_train.txt
  merge_overwrite: false       # set true to force a re-merge
model:
  progen_model_size: 0.8B
  # 2x context vs 16GB: captures full-length proteins (many bacterial proteins > 512 aa)
  # without windowing -> better long-range modeling. stride = context/2 (50% overlap).
  context_length: 1024
  stride: 512
  tokenizer_vocab_size: 256
  rebuild_tokenizer: false
  progen_config_overrides:
    emb_dim: 1024
    n_heads: 16
    n_layers: 16
    hidden_dim: 4096
    head_dim: 64
    n_kv_groups: 4
    linear_key_head_dim: 64
    linear_value_head_dim: 64
    linear_num_key_heads: 16
    linear_num_value_heads: 16
training:
  num_epochs: 5
  max_steps: null
  gradient_accumulation_steps: 18   # bs7 x 18 = effective batch 126 (~128)
  save_every_steps: 100
  eval_freq: 100
  eval_batches: 4
  grad_clip_norm: 1.0
  save_last: false
  save_best: true
  save_final: true
optimizer:
  type: adamw
  learning_rate: 0.0002
  weight_decay: 0.1
  fused: auto
  lr_scheduler: cosine
  warmup_steps: 200
  min_lr_ratio: 0.1
  # TUNE to ~ total expected optimizer steps (corpus_windows * epochs / accum).
  # Note ctx 1024 + stride 512 yields ~half the windows of the 512-ctx run, so this
  # horizon is typically lower than the 16GB config's. Enables real cosine decay.
  lr_decay_steps: 12000
runtime:
  device: auto
  multi_gpu_mode: auto
  ddp_find_unused_parameters: false
  data_parallel_device_ids: null
  # Volta (V100) has no native bf16 -> fp16. Change to bf16 ONLY on Ampere+ (A100/A30).
  mixed_precision: fp16
  preflight_vram_check: true
  # Target ~28 GB on a 32 GB card (leaves ~4 GB for driver/reserved/fragmentation).
  # Preflight measures the real backward peak and aborts cleanly before training if
  # the configured batch_size would exceed this.
  target_vram_gb: 28.0
  # true = fp32 recurrence in the gated-delta-net linear attention = more numerically
  # accurate than the 16GB box's bf16 fallback. 32 GB has the headroom; better accuracy.
  use_fp32_fallback_linear_attention: true
  # Set true to recompute block activations in backward (~half activation VRAM, ~30%
  # slower). Numerically exact (no dropout). Enables ctx 2048 or model scale-up on 32 GB.
  gradient_checkpointing: false
resume:
  checkpoint_path: data/checkpoints/protein_from_scratch/checkpoint_best.pt
  output_checkpoint_path: data/checkpoints/protein_from_scratch/checkpoint_best.pt
  best_checkpoint_path: data/checkpoints/protein_from_scratch/checkpoint_best.pt
  final_checkpoint_path: data/checkpoints/protein_from_scratch/checkpoint_final.pt
  restore_optimizer_state: true
  override_optimizer_hyperparameters: true
  resume_state_path: data/checkpoints/protein_from_scratch/resume_state.json
minio:
  train_parts_prefix_uri: null
  train_part_uris: []
  manifest_uri: null
  endpoint_url: null
  access_key: null
  secret_key: null
  bucket_name: null
  region_name: null
  secure: false
